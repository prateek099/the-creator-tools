services:
  backend:
    build:
      context: ./ct-backend
      target: production
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ./ct-frontend
      target: production        # nginx + built static assets
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
